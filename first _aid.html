<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Первая помощь – MedPocket KZ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для раздела первой помощи (аналогичны emergency, но с зелёным акцентом) */
        :root {
            --aid-primary: #2E7D32; /* Зелёный вместо красного */
            --aid-light: #E8F5E9;
            --aid-border: #A5D6A7;
        }
        body.dark {
            --aid-primary: #66BB6A;
            --aid-light: #1B5E20;
            --aid-border: #388E3C;
        }
        .aid-container {
            padding: 0 0 20px;
        }
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            padding: 0 16px;
        }
        .category-tab {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .category-tab.active {
            background: var(--aid-primary);
            color: white;
            border-color: var(--aid-primary);
        }
        .aid-search {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            margin: 0 16px 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .aid-search input {
            border: none;
            background: transparent;
            font-size: 16px;
            padding: 8px 0;
            outline: none;
            flex: 1;
            color: var(--text);
        }
        .aid-search input::placeholder {
            color: var(--subtext);
        }
        .conditions-list {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .condition-item {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .condition-item:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .condition-item .cond-icon {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }
        .condition-item .cond-info {
            flex: 1;
        }
        .condition-item .cond-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            margin-bottom: 2px;
        }
        .condition-item .cond-desc {
            font-size: 12px;
            color: var(--subtext);
        }
        .condition-item .cond-arrow {
            color: var(--subtext);
            font-size: 18px;
        }
        .detail-screen {
            padding: 0 16px 20px;
        }
        .detail-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--aid-primary);
            margin-bottom: 20px;
        }
        .detail-card h2 {
            color: var(--aid-primary);
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .detail-card .mkb {
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .detail-card .step {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            align-items: flex-start;
        }
        .detail-card .step-num {
            background: var(--aid-primary);
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .detail-card .step-text {
            font-size: 16px;
            color: var(--text);
            line-height: 1.5;
            font-weight: 500;
        }
        .detail-card .step-text strong {
            color: var(--aid-primary);
        }
        .call-btn {
            background: var(--aid-primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: background 0.2s;
        }
        .call-btn:active {
            background: #1B5E20;
        }
        .empty-message {
            text-align: center;
            color: var(--subtext);
            padding: 30px;
            font-size: 16px;
        }
    </style>
</head>

                    <div class="category-tab" data-category="bleeding">🩸 Кровотечения</div>

                </div>

                <!-- Поиск -->
                <div class="aid-search">
                    <input type="text" placeholder="🔍 Поиск по первой помощи..." id="conditionSearch">
                </div>

                <!-- Список -->
                <div class="conditions-list" id="conditionsList"></div>
                <div class="empty-message" id="emptyMessage" style="display: none;">Ничего не найдено</div>
            </section>

            <!-- Экран детальной карточки -->
            <section id="detailScreen" class="screen detail-screen">
                <div class="category-header" style="padding: 16px 0 0;">
                    <span class="back-button" onclick="showList()">← К списку</span>
                    <h2 class="category-title" id="detailTitle">Алгоритм</h2>
                </div>
                <div id="detailContainer"></div>
            </section>
        </main>

            <div class="tab-item">👤</div>
        </nav>

        // Рендер списка с учётом фильтров
        function renderList(category = 'all', search = '') {
            const list = document.getElementById('conditionsList');
            const empty = document.getElementById('emptyMessage');
            list.innerHTML = '';
            let filtered = conditions;

            if (category !== 'all') {
                filtered = filtered.filter(c => c.category === category);
            }
            if (search) {
                const s = search.toLowerCase();
                filtered = filtered.filter(c => c.name.toLowerCase().includes(s) || c.desc.toLowerCase().includes(s));
            }

            if (filtered.length === 0) {
                empty.style.display = 'block';
                return;
            } else {
                empty.style.display = 'none';
            }

            filtered.forEach(cond => {
                const item = document.createElement('div');
                item.className = 'condition-item';
                item.innerHTML = `
                    <div class="cond-icon">${cond.icon}</div>
                    <div class="cond-info">
                        <div class="cond-name">${cond.name}</div>
                        <div class="cond-desc">${cond.desc}</div>
                    </div>
                    <div class="cond-arrow">›</div>
                `;
                item.onclick = () => showDetail(cond.id);
                list.appendChild(item);
            });
        }

        function showDetail(id) {
            const cond = conditions.find(c => c.id === id);
            if (!cond) return;
            document.getElementById('listScreen').classList.remove('active');
            document.getElementById('detailScreen').classList.add('active');
            document.getElementById('detailTitle').textContent = cond.name;

            let stepsHtml = cond.steps.map((step, i) => `
                <div class="step">
                    <div class="step-num">${i + 1}</div>
                    <div class="step-text">${step}</div>
                </div>
            `).join('');

            document.getElementById('detailContainer').innerHTML = `
                <div class="detail-card">
                    <h2>${cond.icon} ${cond.name}</h2>
                    <div class="mkb">${cond.desc}</div>
                    ${stepsHtml}
                    <button class="call-btn" onclick="callAmbulance()">📞 Вызвать скорую (103)</button>
                </div>
            `;
        }

        function showList() {
            document.getElementById('detailScreen').classList.remove('active');
            document.getElementById('listScreen').classList.add('active');
        }

        function goBackToMain() {
            window.location.href = 'index.html';
        }

        function callAmbulance() {
            alert('Вызов 103... (имитация)');
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const cat = tab.dataset.category;
                    const search = document.getElementById('conditionSearch').value;
                    renderList(cat, search);
                });
            });

            document.getElementById('conditionSearch').addEventListener('input', (e) => {
                const activeCat = document.querySelector('.category-tab.active')?.dataset.category || 'all';
                renderList(activeCat, e.target.value);
            });

            renderList();
        });
    </script>
</body>
