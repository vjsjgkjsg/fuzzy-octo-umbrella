<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Лекарственный справочник – MedPocket KZ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --drug-primary: #00796B;
            --drug-light: #E0F2F1;
            --drug-border: #80CBC4;
            --drug-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        body.dark {
            --drug-primary: #4DB6AC;
            --drug-light: #004D40;
            --drug-border: #26A69A;
            --drug-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .drug-container { padding: 0 0 30px; }
        .drug-search {
            margin: 16px 16px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            box-shadow: var(--drug-shadow);
        }
        .drug-search input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px;
            padding: 12px 0;
            outline: none;
            color: var(--text);
        }
        .alphabet-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 16px 16px;
        }
        .letter-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .letter-btn.active {
            background: var(--drug-primary);
            color: white;
            border-color: var(--drug-primary);
        }
        .drug-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 0 16px;
        }
        .drug-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 14px;
            width: calc(50% - 6px);
            box-shadow: var(--drug-shadow);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
        }
        .drug-card:active { transform: scale(0.96); }
        .drug-card .drug-icon { font-size: 32px; margin-bottom: 8px; }
        .drug-card .drug-name { font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 4px; }
        .drug-card .drug-mnn { font-size: 12px; color: var(--subtext); }

        .detail-screen { padding: 0 16px 30px; }
        .drug-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--drug-shadow);
            border: 2px solid var(--drug-primary);
        }
        .drug-panel h2 {
            color: var(--drug-primary);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .drug-panel .mnn {
            font-size: 15px;
            color: var(--subtext);
            margin-bottom: 6px;
        }
        .drug-panel .tradenames {
            background: var(--drug-light);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--drug-primary);
            font-size: 14px;
        }
        .drug-section {
            margin-bottom: 20px;
        }
        .drug-section h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }
        .drug-section p, .drug-section li {
            font-size: 15px;
            color: var(--text);
            line-height: 1.5;
        }
        .drug-section ul {
            padding-left: 20px;
        }
        .btn-back {
            background: var(--drug-primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn-back:active { opacity: 0.8; }
        .empty-message { text-align: center; color: var(--subtext); padding: 30px; }
    </style>
</head>
<body>
<div id="app">
    <header class="header">
        <div class="logo">MedPocket KZ</div>
        <div class="header-icons">
            <span>🔔</span>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            <span>⚙️</span>
        </div>
    </header>

    <main class="content">
        <section id="listScreen" class="screen active">
            <div class="category-header" style="padding:16px;">
                <span class="back-button" onclick="goBackToMain()">← Назад</span>
                <h2 class="category-title">💊 Лекарственный справочник</h2>
            </div>
            <div class="drug-search">
                <input type="text" placeholder="🔍 Поиск по названию или МНН..." id="drugSearch">
            </div>
            <div class="alphabet-bar" id="alphabetBar"></div>
            <div class="drug-grid" id="drugGrid"></div>
            <div class="empty-message" id="emptyMsg" style="display:none;">Ничего не найдено</div>
        </section>

        <section id="detailScreen" class="screen detail-screen">
            <div class="category-header" style="padding:16px 0;">
                <span class="back-button" onclick="showList()">← К списку</span>
                <h2 class="category-title" id="detailTitle"></h2>
            </div>
            <div id="detailContainer"></div>
        </section>
    </main>

    <nav class="tab-bar">
        <div class="tab-item" onclick="goBackToMain()">🏠</div>
        <div class="tab-item">🔍</div>
        <div class="tab-item">⭐</div>
        <div class="tab-item">👤</div>
    </nav>
</div>

    // Сбор уникальных первых букв
    const alphabet = [...new Set(drugs.map(d => d.name.charAt(0).toUpperCase()))].sort();

    function renderAlphabet() {
        const bar = document.getElementById('alphabetBar');
        bar.innerHTML = alphabet.map(letter => `<div class="letter-btn" data-letter="${letter}">${letter}</div>`).join('');
        document.querySelectorAll('.letter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const letter = btn.dataset.letter;
                const search = document.getElementById('drugSearch').value;
                renderDrugGrid(letter, search);
            });
        });
    }

    function renderDrugGrid(letter = '', search = '') {
        const grid = document.getElementById('drugGrid');
        const empty = document.getElementById('emptyMsg');
        let filtered = drugs;
        if (letter) filtered = filtered.filter(d => d.name.charAt(0).toUpperCase() === letter);
        if (search) {
            const s = search.toLowerCase();
            filtered = filtered.filter(d => d.name.toLowerCase().includes(s) || d.mnn.toLowerCase().includes(s));
        }

            grid.innerHTML = '';
