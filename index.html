<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MedPocket KZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0B2B5E;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        #app {
            width: 100%;
            max-width: 480px;
            background: #F5F7FA;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }
        /* Шапка */
        .header {
            background: #FFFFFF;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #E5E7EB;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #0B2B5E;
            letter-spacing: -0.5px;
        }
        .header-icons {
            display: flex;
            gap: 12px;
            font-size: 22px;
        }
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
            -webkit-overflow-scrolling: touch;
        }
        .screen {
            display: none;
            padding: 16px;
        }
        .screen.active {
            display: block;
        }
        /* Поиск */
        .search-container {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid #E5E7EB;
        }
        .search-container input {
            flex: 1;
            border: none;
            font-size: 16px;
            padding: 12px 0;
            outline: none;
            background: transparent;
        }
        .search-mic {
            font-size: 20px;
            margin-left: 8px;
        }
        /* Красная кнопка */
        .emergency-btn {
            background: #E53935;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .emergency-btn:active {
            transform: scale(0.97);
        }
        .emergency-btn .text {
            color: white;
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .emergency-btn .arrow {
            color: white;
            font-size: 20px;
        }
        /* Быстрые действия */
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .quick-action {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 10px 16px;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 600;
            color: #0B2B5E;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        /* Сетка карточек */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
        }
        .card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 14px;
            width: calc(50% - 6px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.1s;
            cursor: pointer;
        }
        .card:active {
            transform: scale(0.96);
        }
        .card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .card .title {
            font-weight: 700;
            font-size: 15px;
            color: #1A1A1A;
            margin-bottom: 4px;
        }
        .card .desc {
            font-size: 12px;
            color: #6B7280;
            line-height: 1.4;
        }
        /* Нижняя панель */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: #FFFFFF;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            border-top: 1px solid #E5E7EB;
            z-index: 20;
        }
        .tab-item {
            align-items: center;
            font-size: 22px;
            padding: 4px 16px;
            color: #9CA3AF;
            font-weight: 500;
            cursor: pointer;
        }
        .tab-item.active {
            color: #0B2B5E;
            font-weight: 700;
        }
        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 30;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-content {
            background: #FFFFFF;
            width: 100%;
            max-width: 480px;
            border-radius: 24px 24px 0 0;
            padding: 20px 16px 30px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #1A1A1A;
        }
        .modal-close {
            font-size: 24px;
            cursor: pointer;
        }
        .emergency-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .emergency-item {
            background: #FFF5F5;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 12px;
            width: calc(50% - 5px);
            font-weight: 600;
            font-size: 14px;
            color: #B91C1C;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* Заглушки экранов */
        .placeholder {
            font-size: 16px;
            color: #6B7280;
            text-align: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">MedPocket KZ</div>
            <div class="header-icons">
                <span>🔔</span>
                <span>⚙️</span>
            </div>
        </div>

        <!-- Контент -->
        <div class="content">
            <!-- Главный экран -->
            <div id="homeScreen" class="screen active">
                <div class="search-container">
                    <input type="text" placeholder="🔍 Поиск по диагнозу, препарату, приказу..." id="mainSearch">
                    <span class="search-mic">🎤</span>
                </div>
                <div class="emergency-btn" onclick="openEmergency()">
                    <span class="text">🚨 ЭКСТРЕННАЯ ПОМОЩЬ</span>
                    <span class="arrow">›</span>
                </div>
                <div class="quick-actions">
                    <div class="quick-action">🚑 Неотложные</div>
                    <div class="quick-action">💊 Препараты</div>
                    <div class="quick-action">📋 Протоколы</div>
                    <div class="quick-action">📊 Калькуляторы</div>
                    <div class="quick-action">⭐ Избранное</div>
                </div>
                <div class="grid" id="categoryGrid"></div>
            </div>

            <!-- Экран поиска -->
            <div id="searchScreen" class="screen">
                <div class="search-container">
                    <input type="text" placeholder="Поиск по всему справочнику..." id="searchInput">
                    <span class="search-mic">🎤</span>
                </div>
                <div class="placeholder">Начните вводить запрос — результаты появятся здесь</div>
            </div>

            <!-- Избранное -->
            <div id="favoritesScreen" class="screen">
                <div class="placeholder">⭐ Здесь будут ваши избранные алгоритмы и препараты</div>
            </div>

            <!-- Профиль -->
            <div id="profileScreen" class="screen">
                <div class="placeholder">👤 Профиль и настройки специализации</div>
            </div>
        </div>

        <!-- Нижняя панель -->
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('home')">🏠</div>
            <div class="tab-item" onclick="switchTab('search')">🔍</div>
            <div class="tab-item" onclick="switchTab('favorites')">⭐</div>
            <div class="tab-item" onclick="switchTab('profile')">👤</div>
        </div>

        <!-- Модальное окно экстренной помощи -->
        <div id="emergencyModal" class="modal-overlay" onclick="closeEmergency(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <span class="modal-title">🚨 Экстренная помощь</span>
                    <span class="modal-close" onclick="closeEmergencyDirect()">✕</span>
                </div>
                <div class="emergency-grid" id="emergencyGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // Данные категорий
        const categories = [
            { icon: "🩺", title: "Первая помощь", desc: "Базовые алгоритмы, остановка кровотечений" },
            { icon: "🚑", title: "Неотложные состояния", desc: "Расширенные алгоритмы, шкалы" },
            { icon: "💊", title: "Лекарственный справочник", desc: "Более 1500 препаратов, дозировки" },
            { icon: "📋", title: "Клинические протоколы РК", desc: "Актуальные версии, быстрый просмотр" },
            { icon: "📖", title: "Приказы МЗ РК", desc: "По категориям, с отметкой действия" },
            { icon: "📊", title: "Медицинские калькуляторы", desc: "Шкала Глазго, qSOFA, дозы для детей" },
            { icon: "📚", title: "Медицинские шпаргалки", desc: "Схемы, таблицы, нормы лабораторий" },
            { icon: "❤️", title: "Кардиология", desc: "ЭКГ-атлас, шкалы, антикоагулянты" },
            { icon: "🧠", title: "Неврология", desc: "NIHSS, шкала комы, тромболизис" },
            { icon: "🫁", title: "Пульмонология", desc: "Пикфлоуметрия, ступени терапии БА" },
            { icon: "🦠", title: "Инфекционные болезни", desc: "Антибиотикограммы РК, прививки" },
            { icon: "🩹", title: "Травматология", desc: "Иммобилизация, объёмы кровопотери" },
            { icon: "👶", title: "Педиатрия", desc: "Дозы по весу, процентили, неотложка" },
            { icon: "🤰", title: "Акушерство и гинекология", desc: "Сроки, шкала Апгар, преэклампсия" },
            { icon: "🧪", title: "Лабораторная диагностика", desc: "Референсные значения, интерпретация" },
            { icon: "🏥", title: "Справочник фельдшера", desc: "Тактика на ФАПе, госпитализация" },
            { icon: "💉", title: "Инъекции и манипуляции", desc: "Техника с видео, наборы" },
            { icon: "🚑", title: "Скорая медицинская помощь", desc: "Укладки, чек-листы, связь с диспетчером" },
            { icon: "📑", title: "МКБ-10", desc: "Поиск по коду и названию" },
            { icon: "⭐", title: "Избранное", desc: "Личная подборка" }
        ];

        const emergencyStates = [
            "СЛР", "Анафилактический шок", "Инфаркт миокарда", "Инсульт",
            "Отек легких", "Судороги", "Комы", "Гипогликемия",
            "Гипертонический криз", "Отек Квинке"
        ];

        // Рендер сетки категорий
        const grid = document.getElementById('categoryGrid');
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="icon">${cat.icon}</div><div class="title">${cat.title}</div><div class="desc">${cat.desc}</div>`;
            card.onclick = () => alert(`Открыт раздел: ${cat.title}`);
            grid.appendChild(card);
        });

        // Рендер экстренных состояний
        const emergencyGrid = document.getElementById('emergencyGrid');
        emergencyStates.forEach(state => {
            const item = document.createElement('div');
            item.className = 'emergency-item';
            item.innerHTML = `🚨 ${state}`;
            item.onclick = () => {
                alert(`Открыт алгоритм: ${state}`);
                closeEmergencyDirect();
            };
            emergencyGrid.appendChild(item);
        });

        // Навигация по табам
        function switchTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            const screenMap = {
                home: 'homeScreen',
                search: 'searchScreen',
                favorites: 'favoritesScreen',
                profile: 'profileScreen'
            };
            document.getElementById(screenMap[tab]).classList.add('active');
            document.querySelectorAll('.tab-item').forEach((item, index) => {
                const tabs = ['home', 'search', 'favorites', 'profile'];
                if (tabs[index] === tab) item.classList.add('active');
            });
        }

        // Модальное окно
        function openEmergency() {
            document.getElementById('emergencyModal').classList.add('open');
        }
        function closeEmergency(event) {
            if (event.target === document.getElementById('emergencyModal')) {
                document.getElementById('emergencyModal').classList.remove('open');
            }
        }
        function closeEmergencyDirect() {
            document.getElementById('emergencyModal').classList.remove('open');
        }
    </script>
</body>
  </html>
