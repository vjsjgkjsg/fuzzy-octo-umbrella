<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Неотложные состояния – MedPocket KZ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили только для этого раздела */
        .emergency-container {
            padding: 0 0 20px;
        }
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            padding: 0 16px;
        }
        .category-tab {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .category-tab.active {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        .emergency-search {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            margin: 0 16px 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .emergency-search input {
            border: none;
            background: transparent;
            font-size: 16px;
            padding: 8px 0;
            outline: none;
            flex: 1;
            color: var(--text);
        }
        .emergency-search input::placeholder {
            color: var(--subtext);
        }
        .conditions-list {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .condition-item {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .condition-item:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .condition-item .cond-icon {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }
        .condition-item .cond-info {
            flex: 1;
        }
        .condition-item .cond-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            margin-bottom: 2px;
        }
        .condition-item .cond-mkb {
            font-size: 12px;
            color: var(--subtext);
        }
        .condition-item .cond-arrow {
            color: var(--subtext);
            font-size: 18px;
        }
        /* Детальная карточка */
        .detail-screen {
            padding: 0 16px 20px;
        }
        .detail-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--danger);
            margin-bottom: 20px;
        }
        .detail-card h2 {
            color: var(--danger);
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .detail-card .mkb {
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .detail-card .step {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            align-items: flex-start;
        }
        .detail-card .step-num {
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .detail-card .step-text {
            font-size: 16px;
            color: var(--text);
            line-height: 1.5;
            font-weight: 500;
        }
        .detail-card .step-text strong {
            color: var(--danger);
        }
        .call-btn {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: background 0.2s;
        }
        .call-btn:active {
            background: #c62828;
        }
        .empty-message {
            text-align: center;
            color: var(--subtext);
            padding: 30px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">

            <div class="header-icons">

                <span>⚙️</span>
            </div>
        </header>

            <section id="listScreen" class="screen active">

                    <span class="back-button" onclick="goBackToMain()">← Назад</span>
                    <h2 class="category-title">🚑 Неотложные состояния</h2>
                </div>

                <!-- Категории -->
                <div class="category-tabs" id="categoryTabs">

                    <div class="category-tab" data-category="heart">❤️ Сердце</div>
                    <div class="category-tab" data-category="lungs">🫁 Дыхание</div>
                    <div class="category-tab" data-category="neuro">🧠 Неврология</div>
                    <div class="category-tab" data-category="endo">🍬 Эндокрин.</div>
                    <div class="category-tab" data-category="allergy">🤧 Аллергия</div>
                    <div class="category-tab" data-category="kids">👶 Дети</div>
                    <div class="category-tab" data-category="trauma">🩹 Травмы</div>
                    <div class="category-tab" data-category="other">📦 Прочее</div>
                </div>

                <!-- Поиск -->
                <div class="emergency-search">
                    <input type="text" placeholder="🔍 Быстрый поиск состояния..." id="conditionSearch">
                </div>

                <!-- Список состояний -->
                <div class="conditions-list" id="conditionsList"></div>
                <div class="empty-message" id="emptyMessage" style="display: none;">Ничего не найдено</div>
            </section>

            <!-- Экран детальной карточки -->
            <section id="detailScreen" class="screen detail-screen">
                <div class="category-header" style="padding: 16px 0 0;">
                    <span class="back-button" onclick="showList()">← К списку</span>
                    <h2 class="category-title" id="detailTitle">Алгоритм</h2>
                </div>
                <div id="detailContainer"></div>
            </section>
        </main>

        <!-- Нижняя панель (для быстрого возврата на главную) -->
        <nav class="tab-bar">
            <div class="tab-item" onclick="goBackToMain()">🏠</div>
            <div class="tab-item">🔍</div>
            <div class="tab-item">⭐</div>
            <div class="tab-item">👤</div>
        </nav>
    </div>

                    "Оценить жизненные функции, удалить пострадавшего из зоны воздействия.",
                    "При пероральном отравлении: промывание желудка (если нет противопоказаний, в первые 1-2 часа).",
                    "Активированный уголь 1 г/кг внутрь.",
                    "Специфические антидоты (налоксон, атропин, тиамин) по показаниям.",
                    "Срочная госпитализация в токсикологическое отделение."
                ]
            },
            {
                id: 20,
                name: "Роды вне стационара",
                icon: "🤱",
                mkb: "Z39.0",
                category: "other",
                steps: [
                    "Успокоить женщину, уложить на спину с согнутыми коленями.",
                    "Принять ребенка, обеспечив чистоту (чистые простыни, полотенца).",
                    "Пережать пуповину двумя зажимами (на расстоянии 10 и 15 см от ребенка), пересечь между ними стерильным инструментом.",
                    "Оценить состояние новорожденного (шкала Апгар), при необходимости – СЛР новорожденного (3:1).",
                    "Обеспечить тепло, матери – окситоцин 10 ЕД в/м после рождения плаценты.",
                    "Вызвать скорую для транспортировки в родильное отделение."
                ]
            }
        ];

        // Отображение списка с учетом фильтров
        function renderList(category = 'all', search = '') {
            const list = document.getElementById('conditionsList');
            const empty = document.getElementById('emptyMessage');
            list.innerHTML = '';
            let filtered = conditions;

            if (category !== 'all') {
                filtered = filtered.filter(c => c.category === category);
            }
            if (search) {
                const s = search.toLowerCase();
                filtered = filtered.filter(c => c.name.toLowerCase().includes(s) || c.mkb.toLowerCase().includes(s));
            }

            if (filtered.length === 0) {
                empty.style.display = 'block';
                return;
            } else {
                empty.style.display = 'none';
            }

            filtered.forEach(cond => {
                const item = document.createElement('div');
                item.className = 'condition-item';
                item.innerHTML = `
                    <div class="cond-icon">${cond.icon}</div>
                    <div class="cond-info">
                        <div class="cond-name">${cond.name}</div>
                        <div class="cond-mkb">МКБ-10: ${cond.mkb}</div>
                    </div>
                    <div class="cond-arrow">›</div>
                `;
                item.onclick = () => showDetail(cond.id);
                list.appendChild(item);
            });
        }

        // Показать детальный алгоритм
        function showDetail(id) {
            const cond = conditions.find(c => c.id === id);
            if (!cond) return;
            document.getElementById('listScreen').classList.remove('active');
            document.getElementById('detailScreen').classList.add('active');
            document.getElementById('detailTitle').textContent = cond.name;

            let stepsHtml = cond.steps.map((step, i) => `
                <div class="step">
                    <div class="step-num">${i + 1}</div>
                    <div class="step-text">${step}</div>
                </div>
            `).join('');

            document.getElementById('detailContainer').innerHTML = `
                <div class="detail-card">
                    <h2>${cond.icon} ${cond.name}</h2>
                    <div class="mkb">Код МКБ-10: ${cond.mkb}</div>
                    ${stepsHtml}
                    <button class="call-btn" onclick="callAmbulance()">📞 Вызвать скорую (103)</button>
                </div>
            `;
        }

        // Вернуться к списку
        function showList() {
            document.getElementById('detailScreen').classList.remove('active');
            document.getElementById('listScreen').classList.add('active');
        }

        function goBackToMain() {
            window.location.href = 'index.html';
        }

        function callAmbulance() {
            alert('Вызов 103... (имитация)');
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            // Категории
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const category = tab.dataset.category;
                    const search = document.getElementById('conditionSearch').value;
                    renderList(category, search);
                });
            });

            // Поиск
            document.getElementById('conditionSearch').addEventListener('input', (e) => {
                const activeCat = document.querySelector('.category-tab.active')?.dataset.category || 'all';
                renderList(activeCat, e.target.value);
            });

            // Первый рендер
            renderList();
        });
    </script>
</body>
</html>
