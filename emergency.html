<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Неотложные состояния – MedPocket KZ</title>
    <!-- Общие стили приложения -->
    <link rel="stylesheet" href="style.css">
    <!-- Дополнительные стили именно для этого раздела -->
    <style>
        /* Список неотложных состояний */
        .emergency-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .emergency-list-item {
            background: var(--card-bg);
            border: 1px solid var(--emergency-item-border);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            color: #B91C1C;
            font-weight: 600;
            font-size: 16px;
        }
        .emergency-list-item:active {
            transform: scale(0.97);
            background: var(--emergency-item-bg);
        }
        .emergency-list-item .emoji {
            font-size: 24px;
        }

        /* Карточка детального алгоритма */
        .emergency-detail {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--danger);
            margin-top: 10px;
        }
        .emergency-detail h2 {
            color: var(--danger);
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .emergency-detail .mkb {
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .emergency-detail .step {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            align-items: flex-start;
        }
        .emergency-detail .step-num {
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .emergency-detail .step-text {
            font-size: 16px;
            color: var(--text);
            line-height: 1.5;
            font-weight: 500;
        }
        .emergency-detail .step-text strong {
            color: var(--danger);
        }
        .call-ambulance-btn {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .call-ambulance-btn:active {
            background: #c62828;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="logo">MedPocket KZ</div>
            <div class="header-icons">
                <span>🔔</span>
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <span>⚙️</span>
            </div>
        </header>

        <main class="content">
            <section id="emergencyListScreen" class="screen active">
                <div class="category-header">
                    <span class="back-button" onclick="goBackToMain()">← Назад</span>
                    <h2 class="category-title">🚑 Неотложные состояния</h2>
                </div>
                <div class="emergency-list" id="emergencyListContainer"></div>
            </section>

            <section id="emergencyDetailScreen" class="screen">
                <div class="category-header">
                    <span class="back-button" onclick="showEmergencyList()">← К списку</span>
                    <h2 class="category-title" id="detailTitle">Алгоритм</h2>
                </div>
                <div id="emergencyDetailContainer"></div>
            </section>
        </main>

        <!-- Нижняя панель как на главной, но неактивная (просто заглушка) -->
        <nav class="tab-bar">
            <div class="tab-item" onclick="goBackToMain()">🏠</div>
            <div class="tab-item">🔍</div>
            <div class="tab-item">⭐</div>
            <div class="tab-item">👤</div>
        </nav>
    </div>

    <script>
        // Данные неотложных состояний (можно вынести в отдельный JSON, но пока здесь)
        const emergencyConditions = [
            {
                name: "СЛР",
                icon: "🫀",
                mkb: "I46",
                steps: [
                    "Оценить безопасность. Проверить реакцию пациента: громко окликнуть, потрясти за плечо.",
                    "Вызвать скорую помощь (103). Обеспечить дефибриллятор (АНД).",
                    "Начать компрессии грудной клетки: 30 надавливаний на глубину 5-6 см, частота 100-120 в мин.",
                    "Обеспечить проходимость дыхательных путей (запрокинуть голову, поднять подбородок).",
                    "Выполнить 2 вдоха (по 1 секунде) с визуальным подъёмом грудной клетки.",
                    "Продолжать СЛР в соотношении 30:2 до прибытия помощи или восстановления спонтанного дыхания."
                ]
            },
            {
                name: "Анафилактический шок",
                icon: "🩸",
                mkb: "T78.0",
                steps: [
                    "Прекратить контакт с аллергеном, уложить пациента, ноги приподнять (если нет отёка лёгких).",
                    "Ввести <strong>Адреналин 0,1% 0,5 мл в/м</strong> в передне‑наружную поверхность бедра (взрослым). Детям 0,01 мг/кг.",
                    "Обеспечить венозный доступ: NaCl 0,9% болюсно 500–1000 мл (под контролем АД).",
                    "Антигистаминные: Хлоропирамин (Супрастин) 2% 1 мл в/м.",
                    "Глюкокортикоиды: Преднизолон 90–120 мг в/в струйно.",
                    "При бронхоспазме: Сальбутамол через небулайзер 2,5–5 мг.",
                    "При неэффективности – адреналин в/в титрованно (1 мл 0,1% на 10 мл NaCl 0,9%) под контролем ЭКГ."
                ]
            },
            {
                name: "Инфаркт миокарда (ОКС с подъёмом ST)",
                icon: "❤️‍🔥",
                mkb: "I21",
                steps: [
                    "Вызвать скорую, уложить пациента с приподнятым головным концом.",
                    "Аспирин 250 мг разжевать (при отсутствии противопоказаний).",
                    "Нитроглицерин 0,5 мг сублингвально (при АД сист. > 90 мм рт. ст.), повторять каждые 5 мин до 3 доз.",
                    "Оксигенотерапия при SpO₂ < 90%.",
                    "Обезболивание: Морфин 2-4 мг в/в дробно.",
                    "Тромболизис (тенектеплаза) по протоколу, если время транспортировки > 30 мин."
                ]
            },
            {
                name: "Инсульт (подозрение)",
                icon: "🧠",
                mkb: "I64",
                steps: [
                    "Оценить по шкале FAST (лицо, рука, речь).",
                    "Обеспечить проходимость дыхательных путей, ингаляция кислорода при SpO₂ < 94%.",
                    "Контроль АД: не снижать резко! Если АД > 220/120 – осторожно снижать не более чем на 15% в первые часы.",
                    "Глюкоза крови: гипогликемию (< 3,3 ммоль/л) купировать 40% глюкозой в/в.",
                    "Срочная госпитализация в специализированный инсультный центр.",
                    "Не давать аспирин до исключения геморрагического инсульта (КТ)."
                ]
            },
            {
                name: "Отек легких",
                icon: "🫁",
                mkb: "J81",
                steps: [
                    "Посадить пациента с опущенными ногами, обеспечить доступ воздуха.",
                    "Оксигенотерапия: 100% увлажнённый кислород.",
                    "Нитроглицерин 0,5 мг сублингвально (при систолическом АД > 90 мм рт. ст.), повторять каждые 5 мин.",
                    "Фуросемид 40-80 мг в/в струйно.",
                    "Морфин 2-4 мг в/в (при выраженном беспокойстве и боли).",
                    "При неэффективности – инотропная поддержка (добутамин) и неинвазивная вентиляция лёгких."
                ]
            },
            {
                name: "Гипогликемия",
                icon: "🍬",
                mkb: "E16.2",
                steps: [
                    "Если пациент в сознании: дать 15-20 г быстрых углеводов (сладкий чай, сахар, глюкоза в таблетках).",
                    "При нарушении сознания: 40% раствор глюкозы 20-40 мл в/в струйно.",
                    "При невозможности в/в доступа: глюкагон 1 мг в/м или п/к.",
                    "Контроль уровня глюкозы через 10-15 мин, при необходимости повторить."
                ]
            },
            {
                name: "Гипертонический криз",
                icon: "💥",
                mkb: "I10",
                steps: [
                    "Исключить острое поражение органов-мишеней (головной мозг, сердце, почки).",
                    "При неосложнённом кризе: пероральная терапия (каптоприл 25 мг под язык).",
                    "При осложнённом: в/в введение гипотензивных (урапидил, нитропруссид натрия) под контролем АД.",
                    "Снижать АД не более чем на 25% за первые 2 часа.",
                    "Госпитализация при осложнённом кризе."
                ]
            },
            {
                name: "Отек Квинке",
                icon: "🤧",
                mkb: "T78.3",
                steps: [
                    "Оценить дыхание: при отёке гортани – срочная интубация/коникотомия.",
                    "Адреналин 0,1% 0,3-0,5 мл в/м (может потребоваться повторение через 15 мин).",
                    "Антигистаминные: Хлоропирамин 2% 1 мл в/м.",
                    "Глюкокортикоиды: Преднизолон 60-90 мг в/м или в/в.",
                    "Ингаляция кислорода."
                ]
            }
        ];

        // Рендер списка неотложных состояний
        function renderEmergencyList() {
            const container = document.getElementById('emergencyListContainer');
            container.innerHTML = '';
            emergencyConditions.forEach((condition, index) => {
                const item = document.createElement('div');
                item.className = 'emergency-list-item';
                item.innerHTML = `<span class="emoji">${condition.icon}</span> ${condition.name}`;
                item.onclick = () => showEmergencyDetail(index);
                container.appendChild(item);
            });
        }

        // Показать детальный алгоритм
        function showEmergencyDetail(index) {
            const condition = emergencyConditions[index];
            document.getElementById('emergencyListScreen').classList.remove('active');
            document.getElementById('emergencyDetailScreen').classList.add('active');
            document.getElementById('detailTitle').textContent = condition.name;

            const detailContainer = document.getElementById('emergencyDetailContainer');
            let stepsHtml = '';
            condition.steps.forEach((step, i) => {
                stepsHtml += `
                    <div class="step">
                        <div class="step-num">${i + 1}</div>
                        <div class="step-text">${step}</div>
                    </div>
                `;
            });

            detailContainer.innerHTML = `
                <div class="emergency-detail">
                    <h2>${condition.icon} ${condition.name}</h2>
                    <div class="mkb">Код МКБ-10: ${condition.mkb}</div>
                    ${stepsHtml}
                    <button class="call-ambulance-btn" onclick="callAmbulance()">📞 Вызвать скорую (103)</button>
                </div>
            `;
        }

        // Вернуться к списку состояний
        function showEmergencyList() {
            document.getElementById('emergencyDetailScreen').classList.remove('active');
            document.getElementById('emergencyListScreen').classList.add('active');
        }

        // Назад на главную
        function goBackToMain() {
            window.location.href = 'index.html';
        }

        // Вызов скорой (заглушка)
        function callAmbulance() {
            alert('Вызов 103... (имитация)');
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            renderEmergencyList();
        });
    </script>
</body>
</html>
